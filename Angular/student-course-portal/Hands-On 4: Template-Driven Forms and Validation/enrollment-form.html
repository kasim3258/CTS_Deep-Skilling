<h2>Student Enrollment Request Form</h2>

<form #enrollForm="ngForm" (ngSubmit)="onSubmit(enrollForm)">

  <!-- Student Name -->
  <div>
    <label>Student Name</label><br>

    <input
      type="text"
      name="studentName"
      [(ngModel)]="student.studentName"
      required
      minlength="3"
      #nameCtrl="ngModel">

    <div *ngIf="nameCtrl.touched && nameCtrl.errors?.['required']">
      Name is required
    </div>

    <div *ngIf="nameCtrl.touched && nameCtrl.errors?.['minlength']">
      Name must be at least 3 characters
    </div>
  </div>

  <br>

  <!-- Email -->
  <div>
    <label>Email</label><br>

    <input
      type="email"
      name="studentEmail"
      [(ngModel)]="student.studentEmail"
      required
      email
      #emailCtrl="ngModel">

    <div *ngIf="emailCtrl.touched && emailCtrl.errors?.['required']">
      Email is required
    </div>

    <div *ngIf="emailCtrl.touched && emailCtrl.errors?.['email']">
      Enter a valid email
    </div>
  </div>

  <br>

  <!-- Course ID -->
  <div>
    <label>Course ID</label><br>

    <input
      type="number"
      name="courseId"
      [(ngModel)]="student.courseId"
      required
      #courseCtrl="ngModel">

    <div *ngIf="courseCtrl.touched && courseCtrl.errors?.['required']">
      Course ID is required
    </div>
  </div>

  <br>

  <!-- Semester -->
  <div>
    <label>Preferred Semester</label><br>

    <select
      name="preferredSemester"
      [(ngModel)]="student.preferredSemester"
      required
      #semesterCtrl="ngModel">

      <option value="">-- Select Semester --</option>
      <option value="Odd">Odd</option>
      <option value="Even">Even</option>

    </select>

    <div *ngIf="semesterCtrl.touched && semesterCtrl.errors?.['required']">
      Semester is required
    </div>
  </div>

  <br>

  <!-- Terms -->
  <div>

    <input
      type="checkbox"
      name="agreeToTerms"
      [(ngModel)]="student.agreeToTerms"
      required
      #termsCtrl="ngModel">

    <label>I agree to the Terms & Conditions</label>

    <div *ngIf="termsCtrl.touched && termsCtrl.errors?.['required']">
      Please accept the terms.
    </div>

  </div>

  <br>

  <button
    type="submit"
    [disabled]="enrollForm.invalid">
    Submit
  </button>

  <button
    type="button"
    (click)="enrollForm.resetForm()">
    Reset
  </button>

</form>

<br>

<div *ngIf="submitted">
  <strong>Enrollment request submitted successfully!</strong>
</div>
