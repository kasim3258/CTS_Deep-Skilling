<h1>{{ portalName }}</h1>

<p>
  Manage your courses, enroll in classes, and track your academic progress.
</p>

<div>
  <p><strong>Courses Available:</strong> {{ availableCourses }}</p>
  <p><strong>Enrolled:</strong> 3</p>
  <p><strong>GPA:</strong> 3.8</p>
</div>

<hr>

<button
  [disabled]="!isPortalActive"
  (click)="onEnrollClick()">
  Enroll Now
</button>

<p>{{ message }}</p>

<hr>

<input
  type="text"
  placeholder="Search Course"
  [(ngModel)]="searchTerm">

<p>Searching for: {{ searchTerm }}</p>
