<h2>Reactive Enrollment Form</h2>

<form [formGroup]="enrollForm" (ngSubmit)="onSubmit()">

  <!-- Student Name -->
  <div>
    <label>Student Name</label><br>

    <input
      type="text"
      formControlName="studentName">

    <div *ngIf="enrollForm.get('studentName')?.touched && enrollForm.get('studentName')?.errors?.['required']">
      Name is required.
    </div>

    <div *ngIf="enrollForm.get('studentName')?.touched && enrollForm.get('studentName')?.errors?.['minlength']">
      Name must be at least 3 characters.
    </div>
  </div>

  <br>

  <!-- Student Email -->
  <div>
    <label>Student Email</label><br>

    <input
      type="email"
      formControlName="studentEmail">

    <div *ngIf="enrollForm.get('studentEmail')?.touched && enrollForm.get('studentEmail')?.errors?.['required']">
      Email is required.
    </div>

    <div *ngIf="enrollForm.get('studentEmail')?.touched && enrollForm.get('studentEmail')?.errors?.['email']">
      Invalid email.
    </div>

    <div *ngIf="enrollForm.get('studentEmail')?.errors?.['emailTaken']">
      Email already taken.
    </div>
  </div>

  <br>

  <!-- Course ID -->
  <div>
    <label>Course ID</label><br>

    <input
      type="text"
      formControlName="courseId">

    <div *ngIf="enrollForm.get('courseId')?.touched && enrollForm.get('courseId')?.errors?.['required']">
      Course ID is required.
    </div>

    <div *ngIf="enrollForm.get('courseId')?.errors?.['noCourseCode']">
      Course code starting with XX is not allowed.
    </div>
  </div>

  <br>

  <!-- Preferred Semester -->
  <div>
    <label>Preferred Semester</label><br>

    <select formControlName="preferredSemester">
      <option value="Odd">Odd</option>
      <option value="Even">Even</option>
    </select>
  </div>

  <br>

  <!-- Agree To Terms -->
  <div>
    <input
      type="checkbox"
      formControlName="agreeToTerms">

    I agree to the Terms & Conditions
  </div>

  <br>

  <!-- Additional Courses -->
  <h3>Additional Courses</h3>

  <button
    type="button"
    (click)="addCourse()">
    Add Another Course
  </button>

  <br><br>

  <div formArrayName="additionalCourses">

    <div *ngFor="let ctrl of additionalCourses.controls; let i = index">

      <input [formControlName]="i">

      <button
        type="button"
        (click)="removeCourse(i)">
        Remove
      </button>

      <br><br>

    </div>

  </div>

  <button
    type="submit"
    [disabled]="enrollForm.invalid">
    Submit
  </button>

</form>
