<div class="course-card" appHighlight>

  <h3>{{ course.name }}</h3>

  <p><strong>ID:</strong> {{ course.id }}</p>

  <p><strong>Code:</strong> {{ course.code }}</p>

  <p><strong>Credits:</strong> {{ course.credits | creditLabel }}</p>

  <p>
    <strong>Status:</strong>

    <span [ngSwitch]="course.gradeStatus">

      <span *ngSwitchCase="'passed'"
            [ngClass]="'passed'"
            [ngStyle]="{'font-weight':'bold'}">
        Passed
      </span>

      <span *ngSwitchCase="'pending'"
            [ngClass]="'pending'"
            [ngStyle]="{'font-weight':'bold'}">
        Pending
      </span>

      <span *ngSwitchCase="'failed'"
            [ngClass]="'failed'"
            [ngStyle]="{'font-weight':'bold'}">
        Failed
      </span>

      <span *ngSwitchDefault>
        Unknown
      </span>

    </span>
  </p>

  <button (click)="enroll()">
    Enroll
  </button>

</div>

<hr>
